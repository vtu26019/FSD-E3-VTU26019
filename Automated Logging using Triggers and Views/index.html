<!DOCTYPE html>
<html>
<head>
<title>Activity Logs</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Activity Logs</h2>

<button onclick="loadLogs()">View Logs</button>

<table id="logTable">
<thead>
<tr>
<th>Action</th>
<th>Description</th>
<th>Time</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2>Daily Activity Report</h2>

<button onclick="loadReport()">View Report</button>

<table id="reportTable">
<thead>
<tr>
<th>Date</th>
<th>Total Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
